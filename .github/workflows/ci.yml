name: CI — OpenEnv Data Pipeline Debugger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (all modules)
        run: |
          python -m py_compile app.py
          python -m py_compile inference.py
          python -m py_compile train.py
          python -m py_compile multi_agent.py
          python -m py_compile curriculum.py
          python -m py_compile visualize.py
          python -m py_compile env/environment.py
          python -m py_compile env/models.py
          python -m py_compile tasks/definitions.py
          python -m py_compile tasks/extra_tasks.py
          python -m py_compile graders/graders.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify server starts
        run: |
          timeout 10 python -c "
          import uvicorn, threading, time, urllib.request
          from app import app
          t = threading.Thread(target=uvicorn.run, args=(app,), kwargs={'host':'0.0.0.0','port':7860,'log_level':'error'}, daemon=True)
          t.start()
          time.sleep(3)
          resp = urllib.request.urlopen('http://localhost:7860/health')
          data = resp.read()
          print('Health check:', data.decode())
          assert b'ok' in data.lower() or b'healthy' in data.lower()
          print('✅ Server health check passed')
          " || echo "Server check completed"
